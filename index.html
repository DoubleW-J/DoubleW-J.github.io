<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>永住申請予測ダッシュボード | Permanent Residency Forecast</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/428/428032.png"
    />
    <style>
      :root {
        --primary-color: #2c3e50;
        --accent-color: #3498db;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
      }
      body {
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans",
          Meiryo, sans-serif;
        margin: 0;
        background-color: var(--bg-color);
        color: var(--primary-color);
        line-height: 1.6;
        overflow-x: hidden; /* モバイル端末での不要な横スクロールを防止 */
      }
      a {
        color: #333333;
        text-decoration: none;
        transition: 0.3s;
      }

      a:hover {
        color: #86148b;
        text-decoration: underline;
      }

      .top-bar {
        height: 4px;
        background: linear-gradient(to right, var(--accent-color), #2ecc71);
      }

      header {
        background-color: var(--card-bg);
        padding: 40px 20px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      header h1 {
        margin: 0;
        font-size: 2.2rem;
        letter-spacing: 1px;
      }
      header p {
        color: #7f8c8d;
        margin-top: 10px;
        font-weight: 300;
      }

      .main-content {
        max-width: 1440px;
        margin: 30px auto;
        padding: 0 15px;
      }

      /* 外部カードコンテナ：ダッシュボードを中央に配置し、枠外を切り取る */
      .viz-card {
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        position: relative;
        width: 100%;
        overflow: hidden; /* スケールアウトした要素による崩れを防止 */
        min-height: 500px;
      }

      /* スケーリング用ラッパー：絶対座標とNegative Marginで物理的な中央を固定 */
      #vizContainer {
        width: 1400px; /* ダッシュボードのベース幅を固定 */
        position: absolute;
        left: 50%; /* 親要素の水平中央に配置 */
        transform-origin: top center; /* 中央上部を軸に縮小 */
      }

      footer {
        text-align: center;
        padding: 40px 20px;
        color: #95a5a6;
        font-size: 0.85rem;
      }

      .description-box {
        margin-bottom: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
      }
      .info-item {
        background: #eef2f7;
        padding: 15px 20px;
        border-left: 4px solid var(--accent-color);
        border-radius: 4px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="top-bar"></div>
    <header>
      <h1>Permanent Residency Forecast</h1>
      <p>日本永住許可申請の動向予測・統計分析ポータル</p>
    </header>

    <div class="main-content">
      <div class="description-box">
        <div class="info-item">
          <strong>📊 データソース：</strong
          ><a
            href="https://www.e-stat.go.jp/stat-search?page=1&toukei=00250011"
            target="_blank"
            >e-Stat「出入国管理統計」</a
          >
        </div>
        <div class="info-item">
          <strong>🔍 分析対象：</strong>全国および地方局別の申請・許可状況
        </div>
        <div class="info-item">
          <strong>📈 予測：</strong>申請から処分（結果）までの標準処理期間の推計
        </div>
      </div>

      <div class="viz-card" id="cardParent">
        <div id="vizContainer">
          <div
            class="tableauPlaceholder"
            id="viz1770204389511"
            style="position: relative"
          >
            <object class="tableauViz" style="display: none">
              <param
                name="host_url"
                value="https%3A%2F%2Fpublic.tableau.com%2F"
              />
              <param
                name="name"
                value="SuperstoreDashboard-VizExtensionsEdition_VOTD_17702027410190&#47;viz"
              />
              <param name="toolbar" value="no" />
              <param name="animate_transition" value="yes" />
              <param name="display_static_image" value="yes" />
              <param name="language" value="ja" />
              <param name="filter" value="publish=yes" />
            </object>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-container" style="text-align: center; padding: 20px">
        <a
          href="https://github.com/DoubleW-J/DoubleW-J.github.io"
          target="_blank"
          style="
            text-decoration: none;
            margin: 0 15px;
            display: inline-flex;
            align-items: center;
            color: #333;
          "
        >
          <img
            src="https://img.icons8.com/color/48/github--v1.png"
            alt="GitHub Logo"
            style="width: 32px; height: 32px; margin-right: 8px"
          />
          <span style="font-weight: bold">Project Repo</span>
        </a>

        <a
          href="mailto:jupiter.k.0223@gmail.com"
          style="
            text-decoration: none;
            margin: 0 15px;
            display: inline-flex;
            align-items: center;
            color: #333;
          "
        >
          <img
            src="https://img.icons8.com/color/48/filled-sent.png"
            alt="Contact Me"
            style="width: 32px; height: 32px; margin-right: 8px"
          />
          <span style="font-weight: bold">Contact Me</span>
        </a>
      </div>
      <p>&copy; 2025 PR Forecast Project.</p>
    </footer>

    <script type="text/javascript">
      // ダッシュボードの元サイズ（実際のコンテンツ量に合わせて調整）
      var originalWidth = 1400;
      var originalHeight = 1650;

      function resizeTableau() {
        var card = document.getElementById("cardParent");
        var container = document.getElementById("vizContainer");
        var placeholder = document.getElementById("viz1770204389511");
        var vizObj = placeholder.getElementsByTagName("object")[0];

        if (!card || !container || !vizObj) return;

        var availableWidth = card.offsetWidth;
        var scale = availableWidth / originalWidth;
        if (scale > 1) scale = 1;

        // スケーリングと配置の適用
        container.style.transform = "scale(" + scale + ")";
        container.style.marginLeft = "-" + originalWidth / 2 + "px";

        // カードの高さを算出（下部に少し余白を追加）
        card.style.height = originalHeight * scale + 20 + "px";

        // 強制表示設定
        vizObj.style.display = "block";
        vizObj.style.width = originalWidth + "px";
        vizObj.style.height = originalHeight + "px";

        var iframe = placeholder.getElementsByTagName("iframe")[0];
        if (iframe) {
          iframe.style.display = "block";
          iframe.style.width = originalWidth + "px";
          iframe.style.height = originalHeight + "px";
        }
      }

      window.onresize = resizeTableau;

      var scriptElement = document.createElement("script");
      scriptElement.src =
        "https://public.tableau.com/javascripts/api/viz_v1.js";
      scriptElement.onload = function () {
        resizeTableau();
        // 描画完了を待って段階的に実行
        [500, 1500, 3000].forEach(function (delay) {
          setTimeout(resizeTableau, delay);
        });
      };
      document.getElementById("viz1770204389511").appendChild(scriptElement);
    </script>
  </body>
</html>
